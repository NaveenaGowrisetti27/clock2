<!DOCTYPE html>
<html>
<head>
    <title>Diabetes Prediction</title>
</head>
<body>

<h1>Diabetes Prediction System</h1>

<form action="/predict" method="post">

    <label>Pregnancies:</label>
    <input type="number" name="Pregnancies" required><br><br>

    <label>Glucose:</label>
    <input type="number" name="Glucose" required><br><br>

    <label>Blood Pressure:</label>
    <input type="number" name="BloodPressure" required><br><br>

    <label>Skin Thickness:</label>
    <input type="number" name="SkinThickness" required><br><br>

    <label>Insulin:</label>
    <input type="number" name="Insulin" required><br><br>

    <label>BMI:</label>
    <input type="number" step="0.01" name="BMI" required><br><br>

    <label>Diabetes Pedigree Function:</label>
    <input type="number" step="0.001" name="DiabetesPedigreeFunction" required><br><br>

    <label>Age:</label>
    <input type="number" name="Age" required><br><br>

    <button type="submit">Predict</button>

</form>

{% if result %}
<h2>Prediction Result: {{ result }}</h2>
{% endif %}

</body>
</html>
