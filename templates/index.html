<!DOCTYPE html>
<html>
<head>
    <title>Smart Home IoT Anomaly Detection</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 40px;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
        }

        textarea {
            width: 100%;
            height: 300px;
            padding: 10px;
            font-size: 14px;
        }

        button {
            margin-top: 15px;
            padding: 12px 20px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        h3 {
            color: green;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Smart Home IoT Anomaly Detection</h2>

    <p>Enter feature values in JSON format:</p>

    <form action="/predict" method="post">

        <textarea name="json_data">
{
  "device_id": "DEV_00001",
  "household_id": "HH_0001",
  "room": "Living Room",
  "device_type": "Smart Light",
  "manufacturer": "Philips",
  "model": "A19",
  "firmware_version": "1.0.2",
  "protocol": "WiFi",
  "device_age_days": 120,
  "battery_level_pct": 85,
  "temperature_c": 25.5,
  "humidity_pct": 60,
  "co2_ppm": 450,
  "voc_ppb": 100,
  "light_lux": 250,
  "noise_db": 45,
  "pressure_hpa": 1012,
  "pm25_ugm3": 10,
  "motion_detected": 1,
  "occupancy_count": 2,
  "door_open": 0,
  "window_open": 0,
  "activity_level": 0.5,
  "power_consumption_w": 20,
  "voltage_v": 220,
  "current_a": 0.1,
  "energy_kwh_daily": 1.5,
  "power_factor": 0.95,
  "peak_demand_w": 30,
  "rssi_dbm": -55,
  "snr_db": 35,
  "latency_ms": 10,
  "packet_loss_pct": 0,
  "uptime_hours": 100,
  "connection_drops_24h": 0,
  "error_count_24h": 0,
  "sensor_drift_pct": 0.5,
  "calibration_offset": 0.1,
  "hardware_fault_flag": 0,
  "maintenance_due_flag": 0,
  "intrusion_attempt": 0,
  "unauthorized_access": 0,
  "data_tampering_flag": 0,
  "network_anomaly_score": 0.1,
  "failure_within_7days": 0,
  "next_24h_energy_kwh": 1.4
}
        </textarea>

        <br>

        <button type="submit">Predict</button>

    </form>

    <h3>{{ prediction_text }}</h3>

</div>

</body>
</html>
